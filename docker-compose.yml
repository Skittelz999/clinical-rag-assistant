services:
  db:
    image: pgvector/pgvector:pg16
    container_name: clinical-rag-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clinical_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clinical_app_password}
      POSTGRES_DB: ${POSTGRES_DB:-clinical_rag}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clinical_app} -d ${POSTGRES_DB:-clinical_rag}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clinical-rag-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clinical-rag-frontend
    env_file:
      - .env
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
